<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .container { max-width: 1000px; margin: 0 auto; }

    h1 {
      font-size: 1.6rem;
      color: #58a6ff;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 30px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      align-items: start;
    }

    /* ── Panels ── */
    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
    }

    .panel h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #58a6ff;
      margin-bottom: 16px;
    }

    /* ── Inputs ── */
    input, select, textarea {
      width: 100%;
      padding: 11px 14px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-family: inherit;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    select option { background: #161b22; }

    /* ── Buttons ── */
    button {
      padding: 11px 24px;
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2ea043; }
    button:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* ── Progress ── */
    #progress {
      display: none;
      margin: 16px 0;
    }

    .progress-bar {
      background: #30363d;
      border-radius: 4px;
      height: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      background: #58a6ff;
      border-radius: 4px;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    #progress-text {
      font-size: 0.85rem;
      color: #58a6ff;
    }

    /* ── Report ── */
    #report-box {
      display: none;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px;
      margin-top: 16px;
      line-height: 1.8;
      font-size: 0.95rem;
      white-space: pre-wrap;
      max-height: 600px;
      overflow-y: auto;
    }

    /* ── Stats bar ── */
    #stats-bar {
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 12px;
      font-size: 0.82rem;
      color: #8b949e;
      display: none;
      gap: 20px;
      flex-wrap: wrap;
    }

    .stat { display: flex; flex-direction: column; }
    .stat-val { color: #e0e0e0; font-weight: 600; font-size: 0.95rem; }

    /* ── Sources ── */
    #sources-box {
      display: none;
      margin-top: 12px;
    }

    .source-pill {
      display: inline-block;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem;
      color: #8b949e;
      margin: 3px;
    }

    /* ── Past reports ── */
    .report-item {
      padding: 10px 0;
      border-bottom: 1px solid #30363d;
      font-size: 0.83rem;
      cursor: pointer;
      color: #8b949e;
      transition: color 0.2s;
    }

    .report-item:last-child { border-bottom: none; }
    .report-item:hover { color: #58a6ff; }

    #no-reports {
      color: #555;
      font-size: 0.85rem;
    }

    /* ── Download btn ── */
    #download-btn {
      display: none;
      background: #21262d;
      color: #8b949e;
      font-size: 0.82rem;
      padding: 6px 14px;
      margin-top: 10px;
    }

    #download-btn:hover { background: #30363d; color: #e0e0e0; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔬 Research Agent</h1>
  <p class="subtitle">Give it a topic. It searches, reads, finds gaps, searches again, and writes a report.</p>

  <div class="layout">

    <!-- Left: main panel -->
    <div>
      <div class="panel" style="margin-bottom:20px;">
        <h2>New Research</h2>
        <input id="topic-input" type="text" placeholder="e.g. current state of nuclear fusion energy" />
        <select id="depth-select">
          <option value="fast">Fast — 2 rounds, quick report</option>
          <option value="deep">Deep — 5 rounds, thorough report</option>
        </select>
        <div style="display:flex; gap:12px; align-items:center;">
          <button id="research-btn">Start Research</button>
          <span id="error-msg" style="color:#ff6b6b; font-size:0.85rem;"></span>
        </div>

        <!-- Progress -->
        <div id="progress">
          <div style="height:16px;"></div>
          <div class="progress-bar"><div class="progress-fill"></div></div>
          <span id="progress-text">Initializing research...</span>
        </div>
      </div>

      <!-- Stats -->
      <div id="stats-bar">
        <div class="stat"><span class="stat-val" id="stat-rounds">—</span><span>Rounds</span></div>
        <div class="stat"><span class="stat-val" id="stat-searches">—</span><span>Searches</span></div>
        <div class="stat"><span class="stat-val" id="stat-words">—</span><span>Words</span></div>
      </div>

      <!-- Sources -->
      <div id="sources-box">
        <p style="font-size:0.78rem; color:#555; margin-bottom:6px;">Searches performed</p>
      </div>

      <!-- Report -->
      <div id="report-box"></div>
      <button id="download-btn">⬇ Download Report</button>
    </div>

    <!-- Right: past reports -->
    <div class="panel">
      <h2>Past Reports</h2>
      <div id="reports-list">
        <p id="no-reports">No reports yet.</p>
      </div>
    </div>

  </div>
</div>

<script>
  let currentReport = "";
  let currentTopic  = "";

  // ── Start research ──────────────────────────────────────────
  document.getElementById("research-btn").addEventListener("click", async () => {
    const topic = document.getElementById("topic-input").value.trim();
    const depth = document.getElementById("depth-select").value;
    const errEl = document.getElementById("error-msg");

    if (!topic) { errEl.textContent = "Please enter a topic."; return; }
    errEl.textContent = "";
    currentTopic = topic;

    // Show progress, hide old results
    document.getElementById("progress").style.display       = "block";
    document.getElementById("report-box").style.display     = "none";
    document.getElementById("stats-bar").style.display      = "none";
    document.getElementById("sources-box").style.display    = "none";
    document.getElementById("download-btn").style.display   = "none";
    document.getElementById("research-btn").disabled        = true;

    setProgress(`Researching "${topic}"... this may take a minute.`);

    const res  = await fetch("/research", {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify({ topic, depth })
    });
    const data = await res.json();

    document.getElementById("progress").style.display  = "none";
    document.getElementById("research-btn").disabled   = false;

    if (data.error) { errEl.textContent = data.error; return; }

    // Show stats
    const statsBar = document.getElementById("stats-bar");
    statsBar.style.display             = "flex";
    document.getElementById("stat-rounds").textContent   = data.rounds_run;
    document.getElementById("stat-searches").textContent = data.searches_run;
    document.getElementById("stat-words").textContent    = data.word_count;

    // Show sources
    const sourcesBox = document.getElementById("sources-box");
    sourcesBox.style.display = "block";
    sourcesBox.innerHTML     = `<p style="font-size:0.78rem; color:#555; margin-bottom:6px;">Searches performed</p>`;
    data.sources.forEach(s => {
      const pill = document.createElement("span");
      pill.className   = "source-pill";
      pill.textContent = s;
      sourcesBox.appendChild(pill);
    });

    // Show report
    currentReport = data.report;
    const reportBox = document.getElementById("report-box");
    reportBox.style.display = "block";
    reportBox.textContent   = data.report;

    // Show download button
    document.getElementById("download-btn").style.display = "inline-block";

    loadReports();
  });

  // ── Download report ─────────────────────────────────────────
  document.getElementById("download-btn").addEventListener("click", () => {
    const blob = new Blob([currentReport], { type: "text/markdown" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = `${currentTopic.replace(/\s+/g, "_")}_report.md`;
    a.click();
    URL.revokeObjectURL(url);
  });

  // ── Load past reports ───────────────────────────────────────
  async function loadReports() {
    const res   = await fetch("/reports");
    const files = await res.json();
    const list  = document.getElementById("reports-list");

    if (files.length === 0) {
      list.innerHTML = `<p id="no-reports">No reports yet.</p>`;
      return;
    }

    list.innerHTML = files.map(f => `
      <div class="report-item" onclick="loadReport('${f}')">${f.replace(/_/g, " ").replace(".md", "")}</div>
    `).join("");
  }

  async function loadReport(filename) {
    const res  = await fetch(`/reports/${filename}`);
    const data = await res.json();

    currentReport = data.content;
    document.getElementById("report-box").style.display = "block";
    document.getElementById("report-box").textContent   = data.content;
    document.getElementById("download-btn").style.display = "inline-block";
  }

  // ── Helpers ─────────────────────────────────────────────────
  function setProgress(msg) {
    document.getElementById("progress-text").textContent = msg;
  }

  loadReports();
</script>
</body>
</html>
